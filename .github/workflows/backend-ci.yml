name: Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test Go Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: |
          cd backend
          go mod download

      - name: Build Backend
        run: |
          cd backend
          go build -v -o bin/server main.go

      - name: Run Unit Tests
        run: |
          cd backend
          go test -v ./...

  load-test-smoke:
    name: K6 Smoke Load Test
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/stress_test.js
          flags: --vus 10 --duration 30s

name: Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test Go Backend
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: textile_erp_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: |
          cd backend
          go mod download

      - name: Build Backend
        run: |
          cd backend
          go build -v -o bin/server main.go

      - name: Initialize Database Schema
        env:
          PGPASSWORD: password
        run: |
          psql -h localhost -U postgres -d textile_erp_test -c "
          CREATE TABLE IF NOT EXISTS sales (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              product_id UUID,
              quantity INT,
              total_price DECIMAL,
              version BIGINT DEFAULT 1,
              request_id UUID UNIQUE,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS stock_movements (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              product_id UUID,
              quantity INT,
              type TEXT,
              version BIGINT DEFAULT 1,
              request_id UUID UNIQUE,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS failed_syncs (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              payload JSONB,
              error_message TEXT,
              retry_count INT DEFAULT 0,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );"

      - name: Start Server and Run k6 Smoke Test
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/textile_erp_test?sslmode=disable
          METRICS_TOKEN: ci_test_token
        run: |
          cd backend
          # Sunucuyu başlat ve çıktıları log.txt'ye yaz
          ./bin/server > server_log.txt 2>&1 & 
          sleep 7
          
          # Sunucu hala ayakta mı kontrol et
          ps aux | grep server
          
          # k6 yükle (Sadece gerekliyse - normalde k6 action daha iyidir ama bu yapı daha kontrollü)
          curl https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz -L | tar xvz
          ./k6-v0.49.0-linux-amd64/k6 run ../tests/load/stress_test.js --vus 5 --duration 10s || (cat server_log.txt && exit 1)

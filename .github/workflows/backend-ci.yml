name: Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test Go Backend
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: textile_erp_test
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: |
          cd backend
          go mod download

      - name: Build Backend
        run: |
          cd backend
          go build -v -o bin/server main.go
          chmod +x bin/server

      - name: Initialize Database Schema
        env:
          PGPASSWORD: password
        run: |
          psql -h 127.0.0.1 -U postgres -d textile_erp_test -f - <<EOF
          CREATE TABLE IF NOT EXISTS sales (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              product_id UUID,
              quantity INT,
              total_price DECIMAL,
              version BIGINT DEFAULT 1,
              request_id UUID UNIQUE,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS stock_movements (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              product_id UUID,
              quantity INT,
              type TEXT,
              version BIGINT DEFAULT 1,
              request_id UUID UNIQUE,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS failed_syncs (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              payload JSONB,
              error_message TEXT,
              retry_count INT DEFAULT 0,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          EOF

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Smoke Test
        env:
          DATABASE_URL: postgres://postgres:password@127.0.0.1:5432/textile_erp_test?sslmode=disable
          REDIS_URL: redis://127.0.0.1:6379
          METRICS_TOKEN: ci_test_token
          PORT: 3001
        run: |
          cd backend
          # Sunucuyu başlat
          ./bin/server > server_log.txt 2>&1 &
          
          echo "Waiting for server to be ready on port 3001..."
          timeout 30s bash -c 'until curl -s http://127.0.0.1:3001/metrics -H "X-Metrics-Token: ci_test_token"; do sleep 1; done' || (echo "ERROR: Server failed to start! Logs:" && cat server_log.txt && exit 1)
          
          echo "Server is UP! Running k6..."
          k6 run ../tests/load/stress_test.js --vus 2 --duration 10s || (echo "Load test failed! Server logs:" && cat server_log.txt && exit 1)

name: Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test Go Backend
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: textile_erp_test
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: |
          cd backend
          go mod download

      - name: Build Backend
        run: |
          cd backend
          go build -v -o bin/server main.go
          chmod +x bin/server

      - name: Initialize Database Schema
        env:
          PGPASSWORD: password
        run: |
          psql -h 127.0.0.1 -U postgres -d textile_erp_test <<'EOF'
          CREATE TABLE IF NOT EXISTS sales (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              shop_id UUID,
              total_amount DECIMAL,
              discount_amount DECIMAL DEFAULT 0,
              status TEXT DEFAULT 'completed',
              version BIGINT DEFAULT 1,
              request_id UUID UNIQUE,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS stock_movements (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              shop_id UUID,
              variant_id UUID,
              quantity INT,
              type TEXT,
              reason TEXT,
              version BIGINT DEFAULT 1,
              request_id UUID UNIQUE,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS failed_syncs (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              payload JSONB,
              error_message TEXT,
              retry_count INT DEFAULT 0,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          EOF

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Start Server & Run Smoke Test
        env:
          DATABASE_URL: postgres://postgres:password@127.0.0.1:5432/textile_erp_test?sslmode=disable
          REDIS_URL: 127.0.0.1:6379
          METRICS_TOKEN: ci_test_token
        run: |
          cd backend
          ./bin/server > server_log.txt 2>&1 &
          SERVER_PID=$!
          
          echo "⏳ Waiting for server (PID: $SERVER_PID)..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/metrics -H "X-Metrics-Token: ci_test_token" > /dev/null 2>&1; then
              echo "✅ Server is UP after ${i}s!"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "💀 Server crashed! Logs:"
              cat server_log.txt
              exit 1
            fi
            sleep 1
          done
          
          if ! curl -sf http://127.0.0.1:3001/metrics -H "X-Metrics-Token: ci_test_token" > /dev/null 2>&1; then
            echo "❌ Server never became ready! Logs:"
            cat server_log.txt
            exit 1
          fi
          
          echo "🚀 Running k6 smoke test..."
          k6 run ../tests/load/ci_smoke_test.js
          
          TEST_EXIT=$?
          echo "📋 Server logs:"
          cat server_log.txt
          exit $TEST_EXIT

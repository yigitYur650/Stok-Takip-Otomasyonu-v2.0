name: Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test Go Backend
    runs-on: ubuntu-latest
    
    # Postgres servisini CI ortamında ayağa kaldırıyoruz ki sunucu hata vermesin
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: textile_erp_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: |
          cd backend
          go mod download

      - name: Build Backend
        run: |
          cd backend
          go build -v -o bin/server main.go

      - name: Run Unit Tests
        run: |
          cd backend
          go test -v ./...

      # TEST ADIMI: Sunucuyu başlat ve k6 testini aynı job içinde koştur
      - name: Start Server and Run k6 Smoke Test
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/textile_erp_test?sslmode=disable
          METRICS_TOKEN: ci_test_token
        run: |
          cd backend
          # Sunucuyu arka planda başlat
          ./bin/server & 
          # Sunucunun açılması için 5 saniye bekle
          sleep 5
          # k6 yükle ve çalıştır (Ubuntu ortamında)
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D23
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
          
          # Testi çalıştır
          k6 run ../tests/load/stress_test.js --vus 5 --duration 10s
